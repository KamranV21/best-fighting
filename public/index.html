<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Best Fighting</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>BEST FIGHTING</h1>
      <p class="subtitle">Oldschool pixel brawler - Offline Local VS</p>

      <section id="menu" class="panel">
        <h2>Offline Character Select</h2>

        <h3>Player 1</h3>
        <div class="fighters" id="p1FighterCards"></div>
        <p id="p1ComboHint" class="hint"></p>

        <h3>Player 2</h3>
        <div class="fighters" id="p2FighterCards"></div>
        <p id="p2ComboHint" class="hint"></p>

        <div class="room-controls">
          <button id="startOfflineBtn">Start Offline Match</button>
        </div>
      </section>

      <section id="gamePanel" class="panel hidden">
        <div class="hud">
          <div>
            <span id="p1Name"></span>
            <div class="hp-wrap"><div id="p1Hp" class="hp"></div></div>
            <span id="p1Wins"></span>
          </div>
          <div class="center-hud">
            <span id="roundTimer">60</span>
            <div id="announcement">Fight!</div>
          </div>
          <div>
            <span id="p2Name"></span>
            <div class="hp-wrap"><div id="p2Hp" class="hp"></div></div>
            <span id="p2Wins"></span>
          </div>
        </div>
        <canvas id="game" width="960" height="540"></canvas>
        <p class="hint">P1: A/D move, W jump, S crouch, F hand, G leg.</p>
        <p class="hint">P2: ←/→ move, ↑ jump, ↓ crouch, Numpad1 hand, Numpad2 leg.</p>
        <button id="backToMenuBtn">Back to Character Select</button>
      </section>

      <p id="status" class="status">Offline mode ready.</p>
    </main>

    <script src="app.js"></script>
  </body>
</html>
